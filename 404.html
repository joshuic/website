function renderNotfound(){
  if (!notfoundImg.complete || notfoundImg.naturalWidth === 0) return;
  notfoundCtx.imageSmoothingEnabled = false;
  notfoundCtx.clearRect(0, 0, notfoundEl.width, notfoundEl.height);
  for (let r = 0; r < nfRows; r++){
    for (let c = 0; c < nfCols; c++){
      notfoundCtx.drawImage(notfoundImg, c * CONTENT_W, r * CONTENT_H);
    }
  }
}

function fit(){

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const scaleByWidth  = vw / CONTENT_W;
  const scaleByHeight = vh / CONTENT_H;
  SCALE = Math.min(scaleByWidth, scaleByHeight);

  tileW = CONTENT_W * SCALE;
  tileH = CONTENT_H * SCALE;

  centerLeft = (vw - tileW) / 2;
  centerTop  = (vh - tileH) / 2;

  screenEl.style.left = centerLeft + 'px';
  screenEl.style.top  = centerTop  + 'px';
  artEl.style.width   = tileW  + 'px';
  artEl.style.height  = tileH  + 'px';

  // Background: cover the whole viewport with the scrolling starfield,
  // tiled at the same pixel scale as the foreground.
  bgMode = 'cover';
  bgColsNeeded = Math.ceil(vw / (FW * SCALE)) + 1;
  bgRowsNeeded = Math.ceil(vh / (FH * SCALE)) + 1;

  bgEl.width  = bgColsNeeded * FW;
  bgEl.height = bgRowsNeeded * FH;
  bgEl.style.width  = (bgColsNeeded * FW * SCALE) + 'px';
  bgEl.style.height = (bgRowsNeeded * FH * SCALE) + 'px';

  // Align tile grid to the centered screen so bg and art stay in phase.
  const bgLeft = centerLeft - Math.ceil(centerLeft / (FW * SCALE)) * (FW * SCALE);
  const bgTop  = centerTop  - Math.ceil(centerTop  / (FH * SCALE)) * (FH * SCALE);
  bgEl.style.left = bgLeft + 'px';
  bgEl.style.top  = bgTop  + 'px';

  nfCols = Math.ceil(vw / tileW) + 1;
  nfRows = Math.ceil(vh / tileH) + 1;
  notfoundEl.width  = nfCols * CONTENT_W;
  notfoundEl.height = nfRows * CONTENT_H;
  notfoundEl.style.width  = (nfCols * tileW) + 'px';
  notfoundEl.style.height = (nfRows * tileH) + 'px';
  notfoundEl.style.left = ((vw - nfCols * tileW) / 2) + 'px';
  notfoundEl.style.top  = ((vh - nfRows * tileH) / 2) + 'px';
  renderNotfound();

  renderBg();
  renderGrid();
}
window.addEventListener('resize', fit);

function resettleFit(durationMs){
  const start = performance.now();
  function loop(){
    fit();
    if (performance.now() - start < durationMs){
      requestAnimationFrame(loop);
    }
  }
  requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') resettleFit(600);
});

window.addEventListener('focus', () => resettleFit(600));

window.addEventListener('pageshow', () => resettleFit(600));

let cur=-1, last=performance.now(), acc=FRAME_MS;

const frameCanvas = document.createElement('canvas');
frameCanvas.width = FW; frameCanvas.height = FH;
const frameCtx = frameCanvas.getContext('2d');
frameCtx.imageSmoothingEnabled = false;

const SCROLL_PX_PER_FRAME = 1;
let scrollY = 0;

// Random horizontal placement, chosen once per page load.
// Whole source pixels only, so the field stays pixel-perfect.
const OFFSET_X = Math.floor(Math.random() * FW);

const srcCanvas = document.createElement('canvas');
srcCanvas.width = FW; srcCanvas.height = FH;
const srcCtx = srcCanvas.getContext('2d');
srcCtx.imageSmoothingEnabled = false;

function draw(i){
  srcCtx.putImageData(frameImages[i], 0, 0);

  // Scroll cycle is the clip's own height, so repeats butt edge-to-edge.
  const off = ((scrollY % FH) + FH) % FH;
  const offX = ((OFFSET_X % FW) + FW) % FW;

  // Draw enough copies to cover the window, starting one clip above/left of
  // the offset. Consecutive copies are different parts of the loop, so
  // nothing is ever shown twice at once.
  ctx.clearRect(0, 0, CONTENT_W, CONTENT_H);
  for (let y = off - FH; y < CONTENT_H; y += FH){
    for (let x = offX - FW; x < CONTENT_W; x += FW){
      ctx.drawImage(srcCanvas, x, y);
    }
  }

  // Background tile is one full clip, wrapped at the same offsets so the
  // tiled background stays in phase with the foreground.
  frameCtx.clearRect(0, 0, FW, FH);
  for (const dy of [off, off - FH]){
    for (const dx of [offX, offX - FW]){
      frameCtx.drawImage(srcCanvas, dx, dy);
    }
  }

  renderBg();
}

function renderBg(){
  bgCtx.clearRect(0, 0, bgEl.width, bgEl.height);
  for (let r = 0; r < bgRowsNeeded; r++){
    for (let c = 0; c < bgColsNeeded; c++){
      bgCtx.drawImage(frameCanvas, c * FW, r * FH);
    }
  }
}


function tick(now){

  const dt = Math.min(now - last, FRAME_MS * 4);
  acc += dt; last = now;
  while(acc >= FRAME_MS){
    acc -= FRAME_MS;
    cur=(cur+1)%frameImages.length;
    scrollY += SCROLL_PX_PER_FRAME;
    draw(cur);

    blinkFrame = (blinkFrame+1) % BLINK_CYCLE;
    const nowOn = blinkFrame < BLINK_ON_FRAMES;
    if (nowOn !== blinkOn){
      blinkOn = nowOn;
      renderGrid();
    }
  }
  requestAnimationFrame(tick);
}
fit();
resettleFit(600);

requestAnimationFrame(tick);

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    last = performance.now();
  }
});

const COLS = CONTENT_W / 8;
const ROWS = CONTENT_H / 8;

const TILE_DIR = "tiles/";

const TILE_FILE = {
  " ": "space",
  ".": "period",
  "-": "dash",
  "/": "slash",
  "@": "@",
  "%": "percent",
  "!": "exclamation mark",
  '"': "quotation marks",
  "\u00A9": "copyright"
};
function fileFor(ch){
  if (TILE_FILE[ch] !== undefined) return TILE_FILE[ch];
  return ch;
}

function parseRow(rowStr){
  const cells = [];
  const re = /\[([^\]]?)\]/g;
  let m;
  while ((m = re.exec(rowStr)) !== null){
    cells.push(m[1] === '' ? ' ' : m[1]);
  }
  return cells;
}

function cellsFor(id){
  return PAGES[id].grid.map(parseRow);
}
function pageFromPath(){
  const id = location.pathname.replace(/^\/|\/$/g, '');
  if (id === '') return DEFAULT_PAGE;
  return PAGES[id] ? id : null;
}
function pathFor(id){
  return id === DEFAULT_PAGE ? '/' : '/' + id;
}
let currentPage = pageFromPath();
let GRID_CELLS = currentPage ? cellsFor(currentPage) : [];

const tileImages = {};
function preloadTiles(){
  const need = new Set();
  for (const id in PAGES) for (const row of cellsFor(id)) for (const ch of row) need.add(ch);
  let pending = 0;
  return new Promise(resolve => {
    if (need.size === 0){ resolve(); return; }
    need.forEach(ch => {
      if (ch === " ") return;
      const name = fileFor(ch);
      const img = new Image();
      pending++;
      img.onload  = () => { if (--pending === 0) resolve(); };
      img.onerror = () => { console.warn("missing tile:", name + ".png"); if (--pending === 0) resolve(); };
      img.src = TILE_DIR + name + ".png";
      tileImages[ch] = img;
    });
    if (pending === 0) resolve();
  });
}


const tintTile = document.createElement('canvas');
tintTile.width = 8; tintTile.height = 8;
const ttx = tintTile.getContext('2d');
ttx.imageSmoothingEnabled = false;

const tileCache = new Map();
function getTile(ch, color){
  const key = ch + '|' + color;
  let t = tileCache.get(key);
  if (t) return t;
  const img = tileImages[ch];
  if (!img || !img.complete || img.naturalWidth === 0) return null;
  ttx.clearRect(0,0,8,8);

  ttx.globalCompositeOperation = 'source-over';
  ttx.drawImage(img, 0, 0, 8, 8);
  ttx.globalCompositeOperation = 'source-in';
  ttx.fillStyle = color;
  ttx.fillRect(0,0,8,8);
  ttx.globalCompositeOperation = 'source-over';
  const snap = document.createElement('canvas');
  snap.width = 8; snap.height = 8;
  snap.getContext('2d').drawImage(tintTile, 0, 0);
  tileCache.set(key, snap);
  return snap;
}

const gridCanvas = document.getElementById('grid');
const gridCtx = gridCanvas.getContext('2d');

const linksEl = document.getElementById('links');
let linkNodes = [];

function rebuildLinks(){
  linksEl.innerHTML = '';
  if (currentPage === null) { linkNodes = []; return; }
  linkNodes = PAGES[currentPage].links.map(link => {
    const a = document.createElement('a');
    if (link.to){
      a.href = pathFor(link.to);
      a.addEventListener('click', e => {
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
        e.preventDefault();
        goToPage(link.to);
      });
    } else {
      a.href = link.href;
      if (link.newTab) { a.target = '_blank'; a.rel = 'noopener'; }
    }
    if (link.label) { a.title = link.label; a.setAttribute('aria-label', link.label); }
    if (SHOW_LINK_DEBUG) a.classList.add('debug');
    linksEl.appendChild(a);
    return a;
  });
  positionLinks();
}

function positionLinks(){
  if (currentPage === null) return;
  const cellW = tileW / COLS;
  const cellH = tileH / ROWS;
  PAGES[currentPage].links.forEach((link, i) => {
    const a = linkNodes[i];
    a.style.left   = (link.startCol * cellW) + 'px';
    a.style.top    = (link.row * cellH) + 'px';
    a.style.width  = ((link.endCol - link.startCol + 1) * cellW) + 'px';
    a.style.height = cellH + 'px';
  });
}

function goToPage(id){
  if (!PAGES[id] || id === currentPage) return;
  currentPage = id;
  try { history.pushState(null, '', pathFor(id)); } catch (err) { console.warn('pushState failed:', err); }
  applyPage();
}

function applyPage(){
  if (currentPage === null){
    stageEl.style.display = 'none';
    notfoundEl.style.display = 'block';
    fit();
    return;
  }
  stageEl.style.display = '';
  notfoundEl.style.display = 'none';
  GRID_CELLS = cellsFor(currentPage);
  rebuildLinks();
  renderGrid();
}

window.addEventListener('popstate', () => {
  currentPage = pageFromPath();
  applyPage();
});

gridReady = true;
applyPage();

function renderGrid(){
  if (!gridReady || currentPage === null) return;

  overlayEl.style.left = centerLeft + 'px';
  overlayEl.style.top  = centerTop  + 'px';
  overlayEl.style.width  = tileW + 'px';
  overlayEl.style.height = tileH + 'px';

  gridCanvas.width  = CONTENT_W;
  gridCanvas.height = CONTENT_H;
  gridCanvas.style.width  = tileW + 'px';
  gridCanvas.style.height = tileH + 'px';
  gridCtx.imageSmoothingEnabled = false;
  gridCtx.clearRect(0,0,CONTENT_W,CONTENT_H);

  tileCache.clear();
  const rowColor = PAGES[currentPage].rowColor;
  for (let r = 0; r < GRID_CELLS.length && r < ROWS; r++){
    const cells = GRID_CELLS[r];
    const color = rowColor[r] || GRID_COLOR;
    for (let c = 0; c < cells.length && c < COLS; c++){
      const ch = cells[c];
      if (ch === ' ') continue;
      if (r === 0 && ch === '!' && !blinkOn) continue;
      const t = getTile(ch, color);
      if (t) gridCtx.drawImage(t, c * 8, r * 8);
    }
  }
  positionLinks();
}

preloadTiles().then(renderGrid);
</script>
</body>
</html>
