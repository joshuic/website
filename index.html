<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>website.com</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; overflow:hidden; }
  #stage { position:fixed; inset:0; }

  /* BACKGROUND: full-viewport canvas. On desktop it fills the black side-bars
     with more copies of the SAME animation, at the SAME pixel scale as the
     center (no stretching), synced to the same frame. On mobile (viewport not
     wider than the center) nothing extra shows -- you just see the center. */
  #bg {
    position:fixed; inset:0; z-index:0;
    display:block;
    image-rendering:pixelated; image-rendering:crisp-edges;
    pointer-events:none;
  }

  /* The center screen keeps native 224x288 aspect and is scaled to fill height.
     Positioned via JS with left/top in device-pixel-exact CSS px (see fit()). */
  #screen { position:absolute; z-index:1; left:0; top:0; }
  /* Canvas draws every source pixel exactly (no layout rounding). Upscaled crisp.
     width/height (CSS display size) are set by JS in fit() to an exact integer
     multiple of the native 224x288 in DEVICE pixels -- this is what makes the
     pixelated upscale seamless. (A CSS transform:scale() on an ancestor is NOT
     used, since some browsers still smooth transformed layers even with
     image-rendering:pixelated set.) */
  #art {
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  /* Overlay sits ON TOP, aligned 1:1 with the art in native 224x288 pixel units.
     Add text boxes / HTML here later. */
  #overlay { position:fixed; left:0; top:0; pointer-events:none; z-index:10; }
  .px-box {
    position:absolute;
    left:calc(var(--x)*1px); top:calc(var(--y)*1px);
    width:calc(var(--w)*1px); height:calc(var(--h)*1px);
    pointer-events:auto;
  }

  /* (No font needed — each character is an 8x8 PNG tile in the tiles/ folder.) */
  /* The character grid: 28 columns x 36 rows of 8x8 cells = 1008 cells, covering
     the whole 224x288 screen exactly. Positioned/sized in display pixels by JS
     so the font is rasterized sharp at final size (crisp at any zoom). */
  #grid { position:absolute; left:0; top:0; image-rendering:pixelated; }
</style>
</head>

  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 18
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 19
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 20
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 21
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 22
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 23
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 24
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 25
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 26
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 27
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 28
  "[ ][ ][ ][ ][ ][ ][©][ ][2][0][2][6][ ][C][E][R][V][A][N][T][E][S][ ][ ][ ][ ][ ][ ]",  // row 29
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 30
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 31
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 32
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 33
  "[ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 34
  "[ ][J][O][S][H][C][E][R][V][.][C][O][M][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ][ ]",  // row 35
];

/* OPTIONAL row colors. Key = row number, value = hex color. Every cell in that
   row uses this color. Rows not listed use GRID_COLOR. */
const ROW_COLOR = {
  0:  "#ff0000",
  3:  "#47deff",
  5:  "#47deff",
};


// ---- Timing: measured directly from the reference video --------------------
// The 60fps reference video loops the full 32-frame animation every ~57 video
// frames = 0.950 s, i.e. ~29.7 ms per source frame.
// True arcade source refresh rate: 60.606061 Hz -> one frame every 1/60.606061 s.
const SOURCE_HZ = 60.606061;
const FRAME_MS = 1000 / SOURCE_HZ;   // ~16.5 ms/frame; 32 frames loop in ~0.528 s

// ---- Blink timing for the "!!!" text in row 0 ------------------------------
// Matches the original arcade hardware's flasher: 16 frames visible,
// 16 frames invisible, 32-frame cycle, ticked at the same SOURCE_HZ cadence
// as the pixel-art animation above (independent counter/loop length so it
// stays correct even if the art's own frame count ever changes).
const BLINK_CYCLE = 32;       // 16 on + 16 off
const BLINK_ON_FRAMES = 16;
let blinkFrame = 0;
let blinkOn = true;

// ---- Decode palette to RGBA and pre-render each frame to an ImageData -------
// This bakes every one of the 224x288 pixels exactly (verified 1:1 vs the PNGs).
const rgb = PAL.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const frameImages = FRAMES.map(rows => {
  const img = ctx.createImageData(FW, FH);
  const buf = img.data;
  let p = 0;                 // pixel index
  for (let y=0; y<rows.length; y++){
    const segs = rows[y];
    for (let s=0; s<segs.length; s++){
      const c = rgb[segs[s][0]], run = segs[s][1];
      for (let k=0; k<run; k++){
        const o = p*4;
        buf[o]=c[0]; buf[o+1]=c[1]; buf[o+2]=c[2]; buf[o+3]=255;
        p++;
      }
    }
  }
  return img;
});

// ---- Zoom-to-fit: integer DEVICE-pixel scale (crisp at any size) ----------
// The old approach scaled #screen with CSS `transform:scale(float)`. Several
// browsers still smooth a transformed layer's contents even when
// image-rendering:pixelated is set, which is what produced the soft/blurred
// fringe around single-pixel details (like the star under the "R"). Instead
// we pick an INTEGER number of physical device pixels per source pixel, and
// set the art's CSS width/height directly (no transform). Scaling a canvas
// via width/height is what image-rendering:pixelated is actually guaranteed
// to apply nearest-neighbour to, and an integer device-pixel factor means
// every source pixel maps to a whole, uniform block of physical pixels --
// no fractional splitting, no seams.
const screenEl = document.getElementById('screen');
const artEl = document.getElementById('art');
const overlayEl = document.getElementById('overlay');

// Background canvas that tiles the same animation across the full width.
const bg = document.getElementById('bg');
const bgctx = bg.getContext('2d');
bgctx.imageSmoothingEnabled = false;

// SCALE = CSS px per source px (may be a fraction, but SCALE*dpr is always
// a whole number -- i.e. exactly `scaleDev` physical pixels per source px).
let SCALE = 1;
let scaleDev = 1;              // integer: physical (device) pixels per source px
// Center copy's position/size, all in CSS px, but device-pixel-exact.
let centerLeft = 0, centerTop = 0, tileW = 0, tileH = 0, showSides = false;
// Same geometry in integer DEVICE pixels, used for the background tiling math
// so repeated copies never drift out of alignment from floating-point error.
let leftDev = 0, topDev = 0, tileWdev = 0, tileHdev = 0;
let gridReady = false;   // set true once gridCanvas/gridCtx exist (further below)

function fit(){
  const dpr = window.devicePixelRatio || 1;
  const vw = window.innerWidth, vh = window.innerHeight;
  const vwDev = vw*dpr, vhDev = vh*dpr;

  // Fill height, but never let the CENTER overflow width -- same rule as
  // before, just computed in whole device pixels so it lands exactly.
  let sDev = Math.floor(vhDev / FH);
  if (FW*sDev > vwDev) sDev = Math.floor(vwDev / FW);
  if (sDev < 1) sDev = 1;
  scaleDev = sDev;
  SCALE = sDev / dpr;

  tileWdev = FW * scaleDev;
  tileHdev = FH * scaleDev;
  tileW = tileWdev / dpr;
  tileH = tileHdev / dpr;

  // Snap the center's top-left corner to a whole device pixel BEFORE
  // converting back to CSS px, so the art never straddles a physical pixel.
  leftDev = Math.round((vwDev - tileWdev) / 2);
  topDev  = Math.round((vhDev  - tileHdev) / 2);
  centerLeft = leftDev / dpr;
  centerTop  = topDev  / dpr;

  // Position + size the art canvas via left/top/width/height (NOT transform).
  screenEl.style.left = centerLeft + 'px';
  screenEl.style.top  = centerTop  + 'px';
  artEl.style.width   = tileW  + 'px';
  artEl.style.height  = tileH  + 'px';

  // Size the background canvas to the full viewport, working directly in
  // device pixels (no CSS-space transform) to keep tiling math exact.
  bg.style.width = vw+'px';
  bg.style.height = vh+'px';
  bg.width  = Math.round(vwDev);
  bg.height = Math.round(vhDev);
  bgctx.setTransform(1,0,0,1,0,0);
  bgctx.imageSmoothingEnabled = false;

  // Only show side copies when there's real space beside the center, i.e.
  // desktop-ish widths. On mobile the center fills the width -> no sides.
  showSides = SHOW_BORDERS && (leftDev > 0);

  renderBG(lastDrawn);                  // redraw immediately on resize
  renderGrid();                         // keep the text overlay in lockstep
}
window.addEventListener('resize', fit);

// A tiny offscreen canvas holding the CURRENT frame at native 224x288.
// We stamp copies of it into the background, scaled by scaleDev (nearest-
// neighbour, integer factor -- same pixels as the center, no stretching).
const src = document.createElement('canvas');
src.width = FW; src.height = FH;
const srcctx = src.getContext('2d');

// Draw the background: the same frame tiled left and right of the center, at
// the SAME integer scale, synced to the SAME frame. All math here is in whole
// device pixels, so copies never drift out of alignment from each other.
let lastDrawn = 0;
function renderBG(frameIndex){
  const vwDev = bg.width, vhDev = bg.height;
  bgctx.clearRect(0,0,vwDev,vhDev);
  if(!showSides || tileWdev<=0) return;   // mobile / no side room -> nothing here

  bgctx.imageSmoothingEnabled = false;
  // How many copies are needed to cover from center outwards to each edge.
  const leftCount  = Math.ceil(leftDev / tileWdev);
  const rightSpace = vwDev - (leftDev + tileWdev);
  const rightCount = Math.ceil(rightSpace / tileWdev);

  // Left side (copies going left from the center)
  for(let n=1; n<=leftCount; n++){
    bgctx.drawImage(src, leftDev - n*tileWdev, topDev, tileWdev, tileHdev);
  }
  // Right side (copies going right from the center)
  for(let n=1; n<=rightCount; n++){
    bgctx.drawImage(src, leftDev + n*tileWdev, topDev, tileWdev, tileHdev);
  }
  // (The center itself is the separate #screen canvas on top; not drawn here.)
}

// ---- Playback at the measured cadence, perfect wrap 31 -> 0 ----------------
let cur=-1, last=performance.now(), acc=FRAME_MS;
function draw(i){
  ctx.putImageData(frameImages[i], 0, 0);       // center canvas (unchanged)
  srcctx.putImageData(frameImages[i], 0, 0);    // keep offscreen source in sync
  lastDrawn = i;
  renderBG(i);                                   // stamp the sides, same frame
}
function tick(now){
  acc += now-last; last=now;
  while(acc >= FRAME_MS){
    acc -= FRAME_MS;
    cur=(cur+1)%frameImages.length;
    draw(cur);

    // Advance the blink counter on the exact same per-frame cadence.
    blinkFrame = (blinkFrame+1) % BLINK_CYCLE;
    const nowOn = blinkFrame < BLINK_ON_FRAMES;
    if (nowOn !== blinkOn){
      blinkOn = nowOn;
      renderGrid();   // only redraw the text overlay when the state flips
    }
  }
  requestAnimationFrame(tick);
}
fit();                 // establish geometry first
requestAnimationFrame(tick);

// ---- Character grid drawn from 8x8 PNG TILES -------------------------------
// Each character is its own 8x8 PNG in the tiles/ folder. The tile defines the
// letter SHAPE; the color you set (GRID_COLOR / ROW_COLOR) tints it. The grid
// controls all spacing, so every character sits cleanly inside one 8x8 tile and
// the result is always pixel-perfect. Edit the GRID above.
const COLS = FW / 8;   // 28
const ROWS = FH / 8;   // 36

// Folder holding the tiles (relative to index.html).
const TILE_DIR = "tiles/";

// Map each character to its PNG filename (some glyphs use word-names for files
// that can't be filenames directly). Letters A-Z and digits 0-9 map to
// "<char>.png"; add or change entries here if your filenames differ.
// Map each typed character to its PNG filename (for glyphs whose filename can't
// be the character itself). Letters A-Z and digits 0-9 use "<char>.png" directly.
// The left side is what you TYPE in a grid cell; the right side is the file in tiles/.
const TILE_FILE = {
  " ": "space",              // space
  ".": "period",             // .
  "-": "dash",               // -
  "/": "slash",              // /
  "@": "@",                  // @
  "%": "percent",            // %
  "!": "exclamation mark",   // !
  '"': "quotation marks",    // "
  "\u00A9": "copyright"      // © (type the © symbol, or use "(C)" below)
};
// Also accept "(C)" typed as three characters? No — one cell = one character.
// To place the © tile, put the © symbol in that single cell.
function fileFor(ch){
  if (TILE_FILE[ch] !== undefined) return TILE_FILE[ch];
  return ch;   // A-Z, 0-9 -> "<char>.png"
}

// Parse a "[H][I][ ][S]" bracket row into an array of single characters.
// Each cell is the text between "[" and "]". A "[ ]" cell becomes a space.
function parseRow(rowStr){
  const cells = [];
  const re = /\[([^\]]?)\]/g;   // matches [x] or [] , capturing the inner char
  let m;
  while ((m = re.exec(rowStr)) !== null){
    cells.push(m[1] === '' ? ' ' : m[1]);
  }
  return cells;
}
// Pre-parse the whole GRID once into a 2D array [row][col] of characters.
const GRID_CELLS = GRID.map(parseRow);

// Preload every tile image we need (unique characters used in the grid).
const tileImages = {};   // char -> HTMLImageElement
function preloadTiles(){
  const need = new Set();
  for (const row of GRID_CELLS) for (const ch of row) need.add(ch);
  let pending = 0;
  return new Promise(resolve => {
    if (need.size === 0){ resolve(); return; }
    need.forEach(ch => {
      if (ch === " ") return;                 // blank cell, no image needed
      const name = fileFor(ch);
      const img = new Image();
      pending++;
      img.onload  = () => { if (--pending === 0) resolve(); };
      img.onerror = () => { console.warn("missing tile:", name + ".png"); if (--pending === 0) resolve(); };
      img.src = TILE_DIR + name + ".png";
      tileImages[ch] = img;
    });
    if (pending === 0) resolve();
  });
}

// Offscreen 8x8 tile used to tint a glyph to its target color.
const tintTile = document.createElement('canvas');
tintTile.width = 8; tintTile.height = 8;
const ttx = tintTile.getContext('2d');
ttx.imageSmoothingEnabled = false;

// Cache of tinted 8x8 tiles keyed by "char|color".
const tileCache = new Map();
function getTile(ch, color){
  const key = ch + '|' + color;
  let t = tileCache.get(key);
  if (t) return t;
  const img = tileImages[ch];
  if (!img || !img.complete || img.naturalWidth === 0) return null;
  ttx.clearRect(0,0,8,8);
  // Draw the glyph shape, then tint: keep the tile's alpha, replace color.
  ttx.globalCompositeOperation = 'source-over';
  ttx.drawImage(img, 0, 0, 8, 8);
  ttx.globalCompositeOperation = 'source-in';   // recolor opaque pixels
  ttx.fillStyle = color;
  ttx.fillRect(0,0,8,8);
  ttx.globalCompositeOperation = 'source-over';
  const snap = document.createElement('canvas');
  snap.width = 8; snap.height = 8;
  snap.getContext('2d').drawImage(tintTile, 0, 0);
  tileCache.set(key, snap);
  return snap;
}

const gridCanvas = document.getElementById('grid');
const gridCtx = gridCanvas.getContext('2d');
gridReady = true;
renderGrid();   // apply the geometry fit() already computed at script startup

function renderGrid(){
  if (!gridReady) return;   // fit() may call this before the grid is set up
  // Position/size the overlay to EXACTLY match the art canvas (#screen):
  // same centerLeft/centerTop/tileW/tileH computed once in fit(), so there is
  // no separate calculation that could drift by a fraction of a pixel.
  overlayEl.style.left = centerLeft + 'px';
  overlayEl.style.top  = centerTop  + 'px';
  overlayEl.style.width  = tileW + 'px';
  overlayEl.style.height = tileH + 'px';

  // Grid canvas at native 224x288; CSS scales it up crisply (pixelated),
  // by the same integer device-pixel factor as the art.
  gridCanvas.width  = FW;
  gridCanvas.height = FH;
  gridCanvas.style.width  = tileW + 'px';
  gridCanvas.style.height = tileH + 'px';
  gridCtx.imageSmoothingEnabled = false;
  gridCtx.clearRect(0,0,FW,FH);

  tileCache.clear();   // colors may have changed
  for (let r = 0; r < GRID_CELLS.length && r < ROWS; r++){
    const cells = GRID_CELLS[r];
    const color = ROW_COLOR[r] || GRID_COLOR;   // whole-row color
    for (let c = 0; c < cells.length && c < COLS; c++){
      const ch = cells[c];
      if (ch === ' ') continue;                 // blank cell
      if (r === 0 && ch === '!' && !blinkOn) continue;   // blinking "!!!" is OFF this cycle
      const t = getTile(ch, color);
      if (t) gridCtx.drawImage(t, c * 8, r * 8); // grid controls spacing
    }
  }
}
// Re-render once the tiles are loaded (fit()'s own resize listener already
// keeps the overlay in sync with the art canvas on every resize).
preloadTiles().then(renderGrid);
</script>
</body>
