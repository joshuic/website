<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Starfield</title>
<style>
  :root { color-scheme: dark; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  /* The stage fills the viewport and is pure black. The starfield canvas
     draws the grid at full height and centres it, leaving black bars on the
     sides — so on mobile you only ever see "the video". */
  #stage {
    position: fixed;
    inset: 0;
    background: #000;
  }

  /* Layer 0: the starfield itself. */
  #starfield {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Layer 1: an empty, transparent overlay sized to match the visible
     starfield column (same width/position as the grid). Drop your own
     content in here later — text boxes, buttons, anything. It's transparent
     and centred over the field by default. Pointer events pass through unless
     you add interactive children. */
  #overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    /* --field-width is set by JS to match the rendered grid width */
    width: var(--field-width, 100%);
    max-width: 100%;
    pointer-events: none;
    z-index: 2;
  }
  #overlay > * { pointer-events: auto; }

  /* Respect reduced-motion: hold on the first frame instead of animating. */
  @media (prefers-reduced-motion: reduce) {
    /* handled in JS: we start paused on frame 0 */
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="starfield"></canvas>
    <div id="overlay">
      <!-- Add overlay content here later. Example:
      <div style="padding:2rem;color:#fff;font:600 1.25rem system-ui;text-align:center">
        Your text here
      </div>
      -->
    </div>
  </div>

  <script src="starfield.js"></script>
  <script>
    (function () {
      var canvas = document.getElementById('starfield');
      var overlay = document.getElementById('overlay');

      Starfield.load(canvas, 'starfield_data.json').then(function (sf) {
        // Keep the overlay column aligned to the rendered grid width.
        function syncOverlay() {
          var cssH = canvas.clientHeight;
          var cell = cssH / sf.rows;
          var gridW = cell * sf.cols;
          overlay.style.setProperty('--field-width', gridW + 'px');
        }
        syncOverlay();
        window.addEventListener('resize', syncOverlay);

        var reduce = window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (reduce) {
          sf._draw();            // show a single static frame
        } else {
          sf.start();
        }

        // pause when tab is hidden to save resources
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) sf.stop();
          else if (!reduce) sf.start();
        });

        window.starfield = sf;   // exposed for tinkering
      }).catch(function (err) {
        console.error(err);
        document.body.innerHTML =
          '<p style="color:#f55;font:14px system-ui;padding:1rem">' +
          'Could not load starfield data. Make sure starfield_data.json ' +
          'is served alongside this page (over http, not file://).</p>';
      });
    })();
  </script>
</body>
</html>
