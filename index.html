<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arcade Screen</title>
<style>

  /* ============================================================
     FONT
     Drop your font file next to this HTML file and it will load.
     File expected: "emulogic.ttf" (rename yours to match, or
     change the url() below to match your filename).
     ============================================================ */
  @font-face {
    font-family: 'pixelfont';
    src: url('pixelfont.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    overflow: hidden;
  }

  /* Fills the browser window, centers the screen, blacks out
     the left/right (or top/bottom) bars so the 224x288 screen
     is "zoomed to fit" without distortion. */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ============================================================
     THE SCREEN
     Everything inside is laid out on the ORIGINAL 224x288 pixel
     grid, then the whole #screen element is scaled up/down as a
     single unit via JS (see bottom of file) so every pixel scales
     together and nothing shifts out of alignment.
     ============================================================ */
  #screen {
    position: relative;
    width: 224px;
    height: 288px;
    background: #000000;
    transform-origin: center center;
    /* prevents any accidental sub-pixel blurring of the border */
    image-rendering: pixelated;
  }

  /* ----- TEXT -----
     Plain, selectable/editable text. Edit the words directly in
     the HTML below to change them. Font-size/position are tuned
     to line up exactly with the 8px pixel-font grid. */
  .txt {
    position: absolute;
    font-family: 'pixelfont', monospace;
    font-size: 8px;
    line-height: 8px;
    color: #DEDEFC;
    white-space: pre;
    letter-spacing: 0;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #label-1up {
    left: 24px;
    top: -1px;
  }

  #label-highscore {
    left: 72px;
    top: -1px;
  }

  #score-1up {
    left: 40px;
    top: 8px;
  }

  #score-highscore {
    left: 120px;
    top: 8px;
  }

  .border {
    position: absolute;
    border: 1px solid #2121F5;
    box-sizing: border-box;
    pointer-events: none;
  }

  #border-outer {
    left: 0px;
    top: 24px;
    width: 224px;
    height: 248px;
  }

  #border-inner {
    left: 3px;
    top: 27px;
    width: 218px;
    height: 242px;
  }

</style>
</head>
<body>

  <div id="screen">

    <div class="txt" id="label-1up">1UP</div>
    <div class="txt" id="label-highscore">HIGH SCORE</div>
    <div class="txt" id="score-1up">00</div>
    <div class="txt" id="score-highscore">00</div>

    <div class="border" id="border-outer"></div>
    <div class="border" id="border-inner"></div>

  </div>

<script>

  (function () {
    var screen = document.getElementById('screen');
    var BASE_W = 224;
    var BASE_H = 288;

    function resize() {
      var scale = Math.min(
        window.innerWidth / BASE_W,
        window.innerHeight / BASE_H
      );
      screen.style.transform = 'scale(' + scale + ')';
    }

    resize();
    window.addEventListener('resize', resize);
  })();
</script>

</body>
</html>
