    links: [

};
const DEFAULT_PAGE = "index";

const SHOW_LINK_DEBUG = false;

const SOURCE_HZ = 60.606061;
const FRAME_MS = 1000 / SOURCE_HZ;

const BLINK_CYCLE = 32;
const BLINK_ON_FRAMES = 16;
let blinkFrame = 0;
let blinkOn = true;

const rgb = PAL.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const frameImages = FRAMES.map(rows => {
  const img = ctx.createImageData(FW, FH);
  const buf = img.data;
  let p = 0;
  for (let y=0; y<rows.length; y++){
    const segs = rows[y];
    for (let s=0; s<segs.length; s++){
      const c = rgb[segs[s][0]], run = segs[s][1];
      for (let k=0; k<run; k++){
        const o = p*4;
        buf[o]=c[0]; buf[o+1]=c[1]; buf[o+2]=c[2]; buf[o+3]=255;
        p++;
      }
    }
  }
  return img;
});

const screenEl = document.getElementById('screen');
const artEl = document.getElementById('art');
const overlayEl = document.getElementById('overlay');
const bgEl = document.getElementById('bg');
const bgCtx = bgEl.getContext('2d');
bgCtx.imageSmoothingEnabled = false;

let SCALE = 1;

let centerLeft = 0, centerTop = 0, tileW = 0, tileH = 0;

let bgColsNeeded = 1, bgRowsNeeded = 1;

let bgMode = 'none';

let bgTilesAbove = 0;
let gridReady = false;

function fit(){

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const scaleByWidth  = vw / FW;
  const scaleByHeight = vh / FH;
  SCALE = Math.min(scaleByWidth, scaleByHeight);

  tileW = FW * SCALE;
  tileH = FH * SCALE;

  centerLeft = (vw - tileW) / 2;
  centerTop  = (vh - tileH) / 2;

  screenEl.style.left = centerLeft + 'px';
  screenEl.style.top  = centerTop  + 'px';
  artEl.style.width   = tileW  + 'px';
  artEl.style.height  = tileH  + 'px';

  const leftoverW = vw - tileW;
  const leftoverH = vh - tileH;

  if (leftoverW > 0.5){
    bgMode = 'horizontal';

    const tilesLeft  = Math.max(1, Math.ceil(centerLeft / tileW));
    const tilesRight = Math.max(1, Math.ceil((vw - (centerLeft + tileW)) / tileW));
    bgColsNeeded = tilesLeft + 1 + tilesRight;
    bgRowsNeeded = 1;
    bgEl.width  = bgColsNeeded * FW;
    bgEl.height = FH;
    bgEl.style.width  = (bgColsNeeded * tileW) + 'px';
    bgEl.style.height = tileH + 'px';

    bgEl.style.left = (centerLeft - tilesLeft * tileW) + 'px';
    bgEl.style.top  = centerTop + 'px';
  } else if (leftoverH > 0.5){
    bgMode = 'vertical';

    const tilesAbove = Math.max(1, Math.ceil(centerTop / tileH)) + 1;
    const tilesBelow = Math.max(1, Math.ceil((vh - (centerTop + tileH)) / tileH)) + 1;
    bgColsNeeded = 1;
    bgRowsNeeded = tilesAbove + 1 + tilesBelow;
    bgTilesAbove = tilesAbove;
    bgEl.width  = FW;
    bgEl.height = bgRowsNeeded * FH;
    bgEl.style.width  = tileW + 'px';
    bgEl.style.height = (bgRowsNeeded * tileH) + 'px';
    bgEl.style.left = centerLeft + 'px';
    bgEl.style.top  = (centerTop - tilesAbove * tileH) + 'px';
  } else {
    bgMode = 'none';

    bgColsNeeded = 1; bgRowsNeeded = 1;
    bgEl.width = FW; bgEl.height = FH;
    bgEl.style.width = '0px'; bgEl.style.height = '0px';
  }

  renderBg();
  renderGrid();
}
window.addEventListener('resize', fit);

function resettleFit(durationMs){
  const start = performance.now();
  function loop(){
    fit();
    if (performance.now() - start < durationMs){
      requestAnimationFrame(loop);
    }
  }
  requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') resettleFit(600);
});

window.addEventListener('focus', () => resettleFit(600));

window.addEventListener('pageshow', () => resettleFit(600));

let cur=-1, last=performance.now(), acc=FRAME_MS;

const frameCanvas = document.createElement('canvas');
frameCanvas.width = FW; frameCanvas.height = FH;
const frameCtx = frameCanvas.getContext('2d');
frameCtx.imageSmoothingEnabled = false;

function draw(i){
  ctx.putImageData(frameImages[i], 0, 0);
  frameCtx.putImageData(frameImages[i], 0, 0);
  renderBg();
}

const VERTICAL_OFFSET = 32;
function renderBg(){
  bgCtx.clearRect(0, 0, bgEl.width, bgEl.height);
  for (let r = 0; r < bgRowsNeeded; r++){
    let y = r * FH;
    if (bgMode === 'vertical'){
      if (r < bgTilesAbove) y += VERTICAL_OFFSET;
      else if (r > bgTilesAbove) y -= VERTICAL_OFFSET;
    }
    for (let c = 0; c < bgColsNeeded; c++){
      bgCtx.drawImage(frameCanvas, c * FW, y);
    }
  }
}

function tick(now){

  const dt = Math.min(now - last, FRAME_MS * 4);
  acc += dt; last = now;
  while(acc >= FRAME_MS){
    acc -= FRAME_MS;
    cur=(cur+1)%frameImages.length;
    draw(cur);

    blinkFrame = (blinkFrame+1) % BLINK_CYCLE;
    const nowOn = blinkFrame < BLINK_ON_FRAMES;
    if (nowOn !== blinkOn){
      blinkOn = nowOn;
      renderGrid();
    }
  }
  requestAnimationFrame(tick);
}
fit();
resettleFit(600);

requestAnimationFrame(tick);

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    last = performance.now();
  }
});

const COLS = FW / 8;
const ROWS = FH / 8;

const TILE_DIR = "tiles/";

const TILE_FILE = {
  " ": "space",
  ".": "period",
  "-": "dash",
  "/": "slash",
  "@": "@",
  "%": "percent",
  "!": "exclamation mark",
  '"': "quotation marks",
  "\u00A9": "copyright"
};
function fileFor(ch){
  if (TILE_FILE[ch] !== undefined) return TILE_FILE[ch];
  return ch;
}

function parseRow(rowStr){
  const cells = [];
  const re = /\[([^\]]?)\]/g;
  let m;
  while ((m = re.exec(rowStr)) !== null){
    cells.push(m[1] === '' ? ' ' : m[1]);
  }
  return cells;
}

function cellsFor(id){
  return PAGES[id].grid.map(parseRow);
}
function pageFromPath(){
  const id = location.pathname.replace(/^\/|\/$/g, '');
  return PAGES[id] ? id : DEFAULT_PAGE;
}
function pathFor(id){
  return id === DEFAULT_PAGE ? '/' : '/' + id;
}
let currentPage = pageFromPath();
let GRID_CELLS = cellsFor(currentPage);

const tileImages = {};
function preloadTiles(){
  const need = new Set();
  for (const id in PAGES) for (const row of cellsFor(id)) for (const ch of row) need.add(ch);
  let pending = 0;
  return new Promise(resolve => {
    if (need.size === 0){ resolve(); return; }
    need.forEach(ch => {
      if (ch === " ") return;
      const name = fileFor(ch);
      const img = new Image();
      pending++;
      img.onload  = () => { if (--pending === 0) resolve(); };
      img.onerror = () => { console.warn("missing tile:", name + ".png"); if (--pending === 0) resolve(); };
      img.src = TILE_DIR + name + ".png";
      tileImages[ch] = img;
    });
    if (pending === 0) resolve();
  });
}


const tintTile = document.createElement('canvas');
tintTile.width = 8; tintTile.height = 8;
const ttx = tintTile.getContext('2d');
ttx.imageSmoothingEnabled = false;

const tileCache = new Map();
function getTile(ch, color){
  const key = ch + '|' + color;
  let t = tileCache.get(key);
  if (t) return t;
  const img = tileImages[ch];
  if (!img || !img.complete || img.naturalWidth === 0) return null;
  ttx.clearRect(0,0,8,8);

  ttx.globalCompositeOperation = 'source-over';
  ttx.drawImage(img, 0, 0, 8, 8);
  ttx.globalCompositeOperation = 'source-in';
  ttx.fillStyle = color;
  ttx.fillRect(0,0,8,8);
  ttx.globalCompositeOperation = 'source-over';
  const snap = document.createElement('canvas');
  snap.width = 8; snap.height = 8;
  snap.getContext('2d').drawImage(tintTile, 0, 0);
  tileCache.set(key, snap);
  return snap;
}

const gridCanvas = document.getElementById('grid');
const gridCtx = gridCanvas.getContext('2d');

const linksEl = document.getElementById('links');
let linkNodes = [];

function rebuildLinks(){
  linksEl.innerHTML = '';
  linkNodes = PAGES[currentPage].links.map(link => {
    const a = document.createElement('a');
    if (link.to){
      a.href = pathFor(link.to);
      a.addEventListener('click', e => {
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
        e.preventDefault();
        goToPage(link.to);
      });
    } else {
      a.href = link.href;
      if (link.newTab) { a.target = '_blank'; a.rel = 'noopener'; }
    }
    if (link.label) { a.title = link.label; a.setAttribute('aria-label', link.label); }
    if (SHOW_LINK_DEBUG) a.classList.add('debug');
    linksEl.appendChild(a);
    return a;
  });
  positionLinks();
}

function positionLinks(){
  const cellW = tileW / COLS;
  const cellH = tileH / ROWS;
  PAGES[currentPage].links.forEach((link, i) => {
    const a = linkNodes[i];
    a.style.left   = (link.startCol * cellW) + 'px';
    a.style.top    = (link.row * cellH) + 'px';
    a.style.width  = ((link.endCol - link.startCol + 1) * cellW) + 'px';
    a.style.height = cellH + 'px';
  });
}

function goToPage(id){
  if (!PAGES[id] || id === currentPage) return;
  currentPage = id;
  GRID_CELLS = cellsFor(id);
  try { history.pushState(null, '', pathFor(id)); } catch (err) { console.warn('pushState failed:', err); }
  rebuildLinks();
  renderGrid();
}

window.addEventListener('popstate', () => {
  currentPage = pageFromPath();
  GRID_CELLS = cellsFor(currentPage);
  rebuildLinks();
  renderGrid();
});

rebuildLinks();
gridReady = true;
renderGrid();

function renderGrid(){
  if (!gridReady) return;

  overlayEl.style.left = centerLeft + 'px';
  overlayEl.style.top  = centerTop  + 'px';
  overlayEl.style.width  = tileW + 'px';
  overlayEl.style.height = tileH + 'px';

  gridCanvas.width  = FW;
  gridCanvas.height = FH;
  gridCanvas.style.width  = tileW + 'px';
  gridCanvas.style.height = tileH + 'px';
  gridCtx.imageSmoothingEnabled = false;
  gridCtx.clearRect(0,0,FW,FH);

  tileCache.clear();
  const rowColor = PAGES[currentPage].rowColor;
  for (let r = 0; r < GRID_CELLS.length && r < ROWS; r++){
    const cells = GRID_CELLS[r];
    const color = rowColor[r] || GRID_COLOR;
    for (let c = 0; c < cells.length && c < COLS; c++){
      const ch = cells[c];
      if (ch === ' ') continue;
      if (r === 0 && ch === '!' && !blinkOn) continue;
      const t = getTile(ch, color);
      if (t) gridCtx.drawImage(t, c * 8, r * 8);
    }
  }
  positionLinks();
}

preloadTiles().then(renderGrid);
