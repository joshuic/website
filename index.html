<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>joshcerv.com</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#000; overflow:hidden; }
  #stage { position:fixed; inset:0; }

  /* Border-fill background: tiles the same starfield art across the whole
     viewport, sitting BEHIND #screen so it only shows through in the
     letterboxed bars around the main art. Drawn at the same per-source-pixel
     scale as the main art so the "star size" matches -- it should read as
     one continuous field, not a separately-scaled backdrop. */
  #bg {
    position:absolute; left:0; top:0; z-index:0;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }

  /* The center screen keeps native 224x288 aspect and is scaled to fill the
     viewport (zoom-to-fit, single axis, never both -- see fit()). Positioned
     via JS with left/top in device-pixel-exact CSS px. */
  #screen { position:absolute; z-index:1; left:0; top:0; }
  /* Canvas draws every source pixel exactly (no layout rounding). Upscaled
     crisp. width/height (CSS display size) are set by JS in fit() to an
     exact integer multiple of the native 224x288 in DEVICE pixels -- this is
     what makes the pixelated upscale seamless. (A CSS transform:scale() on
     an ancestor is NOT used, since some browsers still smooth transformed
     layers even with image-rendering:pixelated set.) */
  #art {
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  /* Overlay sits ON TOP, aligned 1:1 with the art in native 224x288 pixel
     units. Add text boxes / HTML here later. */
  #overlay { position:fixed; left:0; top:0; pointer-events:none; z-index:10; }

  /* The character grid: 28 columns x 36 rows of 8x8 cells = 1008 cells,
     covering the whole 224x288 screen exactly. Positioned/sized in display
     pixels by JS so the font is rasterized sharp at final size (crisp at any
     zoom). */
  #grid { position:absolute; left:0; top:0; image-rendering:pixelated; }
</style>
</head>
<body>
<div id="stage">

  <div id="screen">

       double-scale it. renderGrid() positions it exactly over the center and

  <div id="overlay">

  // already-rendered page (the same way it works on claude.ai and any other
  // ordinary website). fit() intentionally does NOT react to zoom: the art
  // is laid out once for the real window size, and the browser's native
  // zoom just magnifies that fixed layout in place, with nothing moving or
  // resizing underneath it.
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Pick ONE axis to fit by -- whichever is tighter -- and never overflow
  // either axis. This is "contain" (zoom to fit entirely on screen) rather
  // than "cover", so the whole 224x288 frame is always fully visible.
  //
  // SCALE is a plain CSS-pixel-per-source-pixel ratio and is allowed to be
  // fractional (e.g. 3.47), not just a whole number. Restricting it to whole
  // device pixels always leaves a leftover remainder on the fitted axis,
  // because the window height/width is essentially never an exact multiple
  // of 288 or 224 -- that remainder is what shows up as a gap above/below
  // (or left/right) the art even though it's centered correctly. Allowing a
  // fractional scale means the fitted axis touches both edges exactly.
  // image-rendering:pixelated still keeps every source pixel a crisp,
  // uniform block -- it just isn't guaranteed to be the same integer size
  // in physical device pixels.
  const scaleByWidth  = vw / FW;
  const scaleByHeight = vh / FH;
  SCALE = Math.min(scaleByWidth, scaleByHeight);

  tileW = FW * SCALE;
  tileH = FH * SCALE;

  centerLeft = (vw - tileW) / 2;
  centerTop  = (vh - tileH) / 2;

  // Position + size the art canvas via left/top/width/height (NOT transform).
  screenEl.style.left = centerLeft + 'px';
  screenEl.style.top  = centerTop  + 'px';
  artEl.style.width   = tileW  + 'px';
  artEl.style.height  = tileH  + 'px';

  // ---- Border fill -----------------------------------------------------
  // "contain" fit only ever leaves bars on ONE axis at a time (never both):
  // if we fit by height, there's leftover width -> left/right bars; if we
  // fit by width, there's leftover height -> top/bottom bars. Whichever
  // axis has bars, tile the SAME art there, anchored so the first tile's
  // edge sits EXACTLY at the main art's edge (not independently centered --
  // that was the bug: an independently-centered tile block only lines up
  // with the art by coincidence at some window sizes, and visibly seams at
  // others). Growing outward from the art's own edge guarantees a flush,
  // seamless join every time, at any window size.
  const leftoverW = vw - tileW;   // > 0 only when bars are on left/right
  const leftoverH = vh - tileH;   // > 0 only when bars are on top/bottom

  if (leftoverW > 0.5){
    bgMode = 'horizontal';
    // Left/right bars: tile horizontally, one row tall (=tileH, matching
    // the art's own height exactly), positioned at centerTop so it lines
    // up with the art vertically too.
    //
    // Tile counts are computed SEPARATELY for the left side and right side
    // of the art (each: how many whole tiles are needed to reach that edge
    // of the viewport from the art's own edge), not from the total leftover
    // space -- halving the total leftover and rounding once undercounts
    // whenever the two sides need a different number of whole tiles to
    // reach the viewport edge (e.g. leftover unevenly split by rounding),
    // which left a real gap of uncovered black on one side.
    const tilesLeft  = Math.max(1, Math.ceil(centerLeft / tileW));
    const tilesRight = Math.max(1, Math.ceil((vw - (centerLeft + tileW)) / tileW));
    bgColsNeeded = tilesLeft + 1 + tilesRight;   // +1 for the tile under the art itself
    bgRowsNeeded = 1;
    bgEl.width  = bgColsNeeded * FW;
    bgEl.height = FH;
    bgEl.style.width  = (bgColsNeeded * tileW) + 'px';
    bgEl.style.height = tileH + 'px';
    // Anchor: strip's left edge is exactly `tilesLeft` whole tiles to the
    // left of the art's own left edge -- guaranteeing a tile boundary lands
    // precisely on centerLeft (and thus on centerLeft+tileW too).
    bgEl.style.left = (centerLeft - tilesLeft * tileW) + 'px';
    bgEl.style.top  = centerTop + 'px';
  } else if (leftoverH > 0.5){
    bgMode = 'vertical';
    // Top/bottom bars: tile vertically, one column wide (=tileW), at
    // centerLeft so it lines up with the art horizontally. Same
    // separate-sides approach as above, applied to the vertical axis.
    //
    // +1 EXTRA tile beyond what's strictly needed to cover the viewport:
    // renderBg() shifts every border tile 16px TOWARD the art (down for
    // tiles above, up for tiles below), which pulls the outermost tile's
    // content inward and would otherwise leave an unpainted 16px gap at
    // the far edge of the viewport. The extra tile is drawn one tile
    // further out than strictly needed, so after the inward shift there's
    // still full coverage all the way to (and past) the viewport edge.
    const tilesAbove = Math.max(1, Math.ceil(centerTop / tileH)) + 1;
    const tilesBelow = Math.max(1, Math.ceil((vh - (centerTop + tileH)) / tileH)) + 1;
    bgColsNeeded = 1;
    bgRowsNeeded = tilesAbove + 1 + tilesBelow;
    bgTilesAbove = tilesAbove;   // renderBg() needs this to know which row is the "art row"
    bgEl.width  = FW;
    bgEl.height = bgRowsNeeded * FH;
    bgEl.style.width  = tileW + 'px';
    bgEl.style.height = (bgRowsNeeded * tileH) + 'px';
    bgEl.style.left = centerLeft + 'px';
    bgEl.style.top  = (centerTop - tilesAbove * tileH) + 'px';
  } else {
    bgMode = 'none';
    // No bars at all (window aspect exactly matches, or smaller than one
    // tile) -- nothing to fill.
    bgColsNeeded = 1; bgRowsNeeded = 1;
    bgEl.width = FW; bgEl.height = FH;
    bgEl.style.width = '0px'; bgEl.style.height = '0px';
  }

  renderBg();     // repaint bg at the (possibly changed) tile count
  renderGrid();   // keep the text overlay in lockstep
}
window.addEventListener('resize', fit);

// Safari (and some other browsers) can report a window size that hasn't
// caught up yet with the FINAL toolbar/tab-bar chrome height at the moment
// this script first runs -- e.g. switching between Safari's "separate tab
// bar" and "compact tab bar" modes, or the very first paint before the
// address bar has finished collapsing/expanding. If fit() only runs once
// against a stale reading, the art gets centered against the WRONG height
// and never recovers until something else fires a resize event, showing up
// as a persistent gap on one edge that looks like a fit() bug but is really
// a stale-size-at-startup bug. To fix this without guessing at browser
// internals, just re-run fit() repeatedly for a short settle window after
// load/visibility changes -- practically free (fit() is cheap), and it
// guarantees we converge on whatever the browser eventually reports as
// final, however long that takes. (This does NOT fire on pinch/trackpad
// zoom -- window.innerWidth/innerHeight don't change for that, by design,
// so zoom stays a pure optical magnification with nothing recalculating.)
function resettleFit(durationMs){
  const start = performance.now();
  function loop(){
    fit();
    if (performance.now() - start < durationMs){
      requestAnimationFrame(loop);
    }
  }
  requestAnimationFrame(loop);
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') resettleFit(600);
});
// Also re-settle if the page regains focus (covers switching tab-bar modes,
// which can happen without a visibilitychange event in some Safari builds).
window.addEventListener('focus', () => resettleFit(600));
// Some Safari versions on macOS fire pageshow (incl. back-forward-cache
// restores) without a matching resize; catch that too.
window.addEventListener('pageshow', () => resettleFit(600));

// ---- Playback at the measured cadence, perfect wrap 31 -> 0 ----------------
let cur=-1, last=performance.now(), acc=FRAME_MS;

// Offscreen canvas holding the CURRENT frame as a drawable image (ImageData
// itself can't be tiled with drawImage -- only put at a single (0,0)
// position -- so each frame is mirrored into this canvas once per frame
// change, then stamped repeatedly across the bg canvas).
const frameCanvas = document.createElement('canvas');
frameCanvas.width = FW; frameCanvas.height = FH;
const frameCtx = frameCanvas.getContext('2d');
frameCtx.imageSmoothingEnabled = false;

function draw(i){
  ctx.putImageData(frameImages[i], 0, 0);       // center canvas
  frameCtx.putImageData(frameImages[i], 0, 0);  // mirror for bg tiling
  renderBg();
}

// Tiles the current frame across the WHOLE bg canvas buffer (bgColsNeeded x
// bgRowsNeeded copies), so every tile -- visible border strip or not -- is
// filled with content at the same per-pixel scale as the main art. No
// scaling happens here (drawImage at 1:1, FWxFH each) -- the CSS width/
// height set in fit() is what scales the whole buffer up, identically to
// how the main art canvas is scaled, so pixel size matches exactly.
//
// In VERTICAL mode, every border tile's CONTENT is the plain, unmodified
// frame (same as the art) -- what changes is its POSITION: tiles above the
// art are drawn 16px further down (closer to the art), and tiles below are
// drawn 16px further up (closer to the art). The art's own tile is never
// moved or altered. This creates a deliberate 16px overlap/gap at the
// border-to-border seams (between adjacent border tiles) while shifting
// the seam CLOSEST to the art by 16px, per confirmed instruction.
const VERTICAL_OFFSET = 32;
function renderBg(){
  bgCtx.clearRect(0, 0, bgEl.width, bgEl.height);
  for (let r = 0; r < bgRowsNeeded; r++){
    let y = r * FH;
    if (bgMode === 'vertical'){
      if (r < bgTilesAbove) y += VERTICAL_OFFSET;        // above the art: shift down, toward it
      else if (r > bgTilesAbove) y -= VERTICAL_OFFSET;   // below the art: shift up, toward it
    }
    for (let c = 0; c < bgColsNeeded; c++){
      bgCtx.drawImage(frameCanvas, c * FW, y);
    }
  }
}

function tick(now){
  // Clamp how much elapsed time a single tick can add. Backgrounded tabs
  // throttle or fully pause requestAnimationFrame, so `now-last` can end up
  // being many seconds (or minutes) once the tab is foregrounded again.
  // Without this cap, the while-loop below would try to synchronously
  // "catch up" through every missed frame in one go -- freezing the tab
  // (looks like a black flash) until it works through the backlog. Capping
  // the delta means we just resume playback from here instead of catching up.
  const dt = Math.min(now - last, FRAME_MS * 4);
  acc += dt; last = now;
  while(acc >= FRAME_MS){
    acc -= FRAME_MS;
    cur=(cur+1)%frameImages.length;
    draw(cur);

    // Advance the blink counter on the exact same per-frame cadence.
    blinkFrame = (blinkFrame+1) % BLINK_CYCLE;
    const nowOn = blinkFrame < BLINK_ON_FRAMES;
    if (nowOn !== blinkOn){
      blinkOn = nowOn;
      renderGrid();   // only redraw the text overlay when the state flips
    }
  }
  requestAnimationFrame(tick);
}
fit();                 // establish geometry immediately (no flash of wrong size)
resettleFit(600);      // then keep correcting for ~600ms in case the browser's
                        // reported viewport height was still settling at load
requestAnimationFrame(tick);

// Belt-and-suspenders: the moment the tab becomes visible again, reset the
// animation clock outright so there's no leftover elapsed time to process
// at all (the clamp in tick() already prevents a freeze either way, but
// this keeps the very first frame back from doing any catch-up work).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    last = performance.now();
  }
});

// ---- Character grid drawn from 8x8 PNG TILES -------------------------------
// Each character is its own 8x8 PNG in the tiles/ folder. The tile defines the
// letter SHAPE; the color you set (GRID_COLOR / ROW_COLOR) tints it. The grid
// controls all spacing, so every character sits cleanly inside one 8x8 tile and
// the result is always pixel-perfect. Edit the GRID above.
const COLS = FW / 8;   // 28
const ROWS = FH / 8;   // 36

// Folder holding the tiles (relative to this HTML file).
const TILE_DIR = "tiles/";

// Map each character to its PNG filename (some glyphs use word-names for files
// that can't be filenames directly). Letters A-Z and digits 0-9 map to
// "<char>.png"; add or change entries here if your filenames differ.
const TILE_FILE = {
  " ": "space",              // space
  ".": "period",             // .
  "-": "dash",               // -
  "/": "slash",              // /
  "@": "@",                  // @
  "%": "percent",            // %
  "!": "exclamation mark",   // !
  '"': "quotation marks",    // "
  "\u00A9": "copyright"      // © (type the © symbol, or use "(C)" below)
};
function fileFor(ch){
  if (TILE_FILE[ch] !== undefined) return TILE_FILE[ch];
  return ch;   // A-Z, 0-9 -> "<char>.png"
}

// Parse a "[H][I][ ][S]" bracket row into an array of single characters.
// Each cell is the text between "[" and "]". A "[ ]" cell becomes a space.
function parseRow(rowStr){
  const cells = [];
  const re = /\[([^\]]?)\]/g;   // matches [x] or [] , capturing the inner char
  let m;
  while ((m = re.exec(rowStr)) !== null){
    cells.push(m[1] === '' ? ' ' : m[1]);
  }
  return cells;
}
// Pre-parse the whole GRID once into a 2D array [row][col] of characters.
const GRID_CELLS = GRID.map(parseRow);

// Preload every tile image we need (unique characters used in the grid).
const tileImages = {};   // char -> HTMLImageElement
function preloadTiles(){
  const need = new Set();
  for (const row of GRID_CELLS) for (const ch of row) need.add(ch);
  let pending = 0;
  return new Promise(resolve => {
    if (need.size === 0){ resolve(); return; }
    need.forEach(ch => {
      if (ch === " ") return;                 // blank cell, no image needed
      const name = fileFor(ch);
      const img = new Image();
      pending++;
      img.onload  = () => { if (--pending === 0) resolve(); };
      img.onerror = () => { console.warn("missing tile:", name + ".png"); if (--pending === 0) resolve(); };
      img.src = TILE_DIR + name + ".png";
      tileImages[ch] = img;
    });
    if (pending === 0) resolve();
  });
}

// Offscreen 8x8 tile used to tint a glyph to its target color.
const tintTile = document.createElement('canvas');
tintTile.width = 8; tintTile.height = 8;
const ttx = tintTile.getContext('2d');
ttx.imageSmoothingEnabled = false;

// Cache of tinted 8x8 tiles keyed by "char|color".
const tileCache = new Map();
function getTile(ch, color){
  const key = ch + '|' + color;
  let t = tileCache.get(key);
  if (t) return t;
  const img = tileImages[ch];
  if (!img || !img.complete || img.naturalWidth === 0) return null;
  ttx.clearRect(0,0,8,8);
  // Draw the glyph shape, then tint: keep the tile's alpha, replace color.
  ttx.globalCompositeOperation = 'source-over';
  ttx.drawImage(img, 0, 0, 8, 8);
  ttx.globalCompositeOperation = 'source-in';   // recolor opaque pixels
  ttx.fillStyle = color;
  ttx.fillRect(0,0,8,8);
  ttx.globalCompositeOperation = 'source-over';
  const snap = document.createElement('canvas');
  snap.width = 8; snap.height = 8;
  snap.getContext('2d').drawImage(tintTile, 0, 0);
  tileCache.set(key, snap);
  return snap;
}

const gridCanvas = document.getElementById('grid');
const gridCtx = gridCanvas.getContext('2d');
gridReady = true;
renderGrid();   // apply the geometry fit() already computed at script startup

function renderGrid(){
  if (!gridReady) return;   // fit() may call this before the grid is set up
  // Position/size the overlay to EXACTLY match the art canvas (#screen):
  // same centerLeft/centerTop/tileW/tileH computed once in fit(), so there is
  // no separate calculation that could drift by a fraction of a pixel.
  overlayEl.style.left = centerLeft + 'px';
  overlayEl.style.top  = centerTop  + 'px';
  overlayEl.style.width  = tileW + 'px';
  overlayEl.style.height = tileH + 'px';

  // Grid canvas at native 224x288; CSS scales it up crisply (pixelated),
  // by the same integer device-pixel factor as the art.
  gridCanvas.width  = FW;
  gridCanvas.height = FH;
  gridCanvas.style.width  = tileW + 'px';
  gridCanvas.style.height = tileH + 'px';
  gridCtx.imageSmoothingEnabled = false;
  gridCtx.clearRect(0,0,FW,FH);

  tileCache.clear();   // colors may have changed
  for (let r = 0; r < GRID_CELLS.length && r < ROWS; r++){
    const cells = GRID_CELLS[r];
    const color = ROW_COLOR[r] || GRID_COLOR;   // whole-row color
    for (let c = 0; c < cells.length && c < COLS; c++){
      const ch = cells[c];
      if (ch === ' ') continue;                 // blank cell
      if (r === 0 && ch === '!' && !blinkOn) continue;   // blinking "!!!" is OFF this cycle
      const t = getTile(ch, color);
      if (t) gridCtx.drawImage(t, c * 8, r * 8); // grid controls spacing
    }
  }
}
// Re-render once the tiles are loaded (fit()'s own resize listener already
// keeps the overlay in sync with the art canvas on every resize).
preloadTiles().then(renderGrid);
</script>
</body>
</html>
