<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joshcerv.com</title>

<link rel="icon" type="image/png" href="./favicon.png?v=2">

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{ box-sizing:border-box; margin:0; padding:0; }

html, body{
  height:100%;
  background:#000000;
  overflow:hidden;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}


.crt-overlay{
  position:fixed;
  inset:0;
  z-index:5;
  pointer-events:none;
}
.crt-overlay::before{
  content:"";
  position:absolute; inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.0) 0px,
    rgba(0,0,0,0.0) 1px,
    rgba(0,0,0,0.35) 2px,
    rgba(0,0,0,0.35) 3px
  );
  mix-blend-mode:multiply;
  animation: scanroll 9s linear infinite;
}
.crt-overlay::after{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.75) 100%);
}
@keyframes scanroll{
  0%{ background-position-y:0px; }
  100%{ background-position-y:120px; }
}
.crt-flicker{
  position:fixed; inset:0; z-index:6; pointer-events:none;
  background:rgba(33,33,255,0.02);
  animation:flicker 6s infinite;
}
@keyframes flicker{
  0%,19%,21%,100%{ opacity:1; }
  20%{ opacity:0.82; }
  50%{ opacity:1; }
  51%{ opacity:0.9; }
  52%{ opacity:1; }
}


.title{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(20px, 6vw, 48px);
  color:#4d5bff;
  text-shadow:
    0 0 6px #2121ff,
    0 0 18px rgba(33,33,255,0.7),
    0 0 40px rgba(33,33,255,0.4);
  letter-spacing:1px;
  animation: bezelPulse 6.5s ease-in-out infinite;
}
@keyframes bezelPulse{
  0%,100%{ text-shadow:
    0 0 6px #2121ff,
    0 0 18px rgba(33,33,255,0.7),
    0 0 40px rgba(33,33,255,0.4); }
  50%{ text-shadow:
    0 0 10px #2121ff,
    0 0 26px rgba(33,33,255,0.9),
    0 0 60px rgba(33,33,255,0.6); }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001s !important; animation-iteration-count:1 !important; }
}
</style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="crt-flicker"></div>

<h1 class="title">joshcerv.com</h1>

</body>
</html>
