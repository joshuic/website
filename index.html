const { w:FW, h:FH, palette:PAL, frames:FRAMES } = DATA;

// ---- Timing: measured directly from the reference video --------------------
// The 60fps reference video loops the full 32-frame animation every ~57 video
// frames = 0.950 s, i.e. ~29.7 ms per source frame.
// True arcade source refresh rate: 60.606061 Hz -> one frame every 1/60.606061 s.
const SOURCE_HZ = 60.606061;
const FRAME_MS = 1000 / SOURCE_HZ;   // ~16.5 ms/frame; 32 frames loop in ~0.528 s

// ---- Decode palette to RGBA and pre-render each frame to an ImageData -------
// This bakes every one of the 224x288 pixels exactly (verified 1:1 vs the PNGs).
const rgb = PAL.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const frameImages = FRAMES.map(rows => {
  const img = ctx.createImageData(FW, FH);
  const buf = img.data;
  let p = 0;                 // pixel index
  for (let y=0; y<rows.length; y++){
    const segs = rows[y];
    for (let s=0; s<segs.length; s++){
      const c = rgb[segs[s][0]], run = segs[s][1];
      for (let k=0; k<run; k++){
        const o = p*4;
        buf[o]=c[0]; buf[o+1]=c[1]; buf[o+2]=c[2]; buf[o+3]=255;
        p++;
      }
    }
  }
  return img;
});

// ---- Zoom-to-fit via transform scale (crisp at any size) -------------------
const screenEl = document.getElementById('screen');

// Background canvas that tiles the same animation across the full width.
const bg = document.getElementById('bg');
const bgctx = bg.getContext('2d');
bgctx.imageSmoothingEnabled = false;

// Current scale (source-pixels -> screen-pixels). Set by fit().
let SCALE = 1;
// Left edge (in device px) of the CENTER copy, and how many source-px wide it is.
let centerLeft = 0, tileW = 0, showSides = false;

function fit(){
  const vh=window.innerHeight, vw=window.innerWidth;
  // Same rule as before: fill height, but never let the CENTER overflow width.
  let s = vh/FH;
  if (FW*s > vw) s = vw/FW;
  SCALE = s;
  screenEl.style.transform = 'scale('+s+')';

  // Size the background canvas to the full viewport (device-pixel accurate).
  const dpr = window.devicePixelRatio || 1;
  bg.style.width = vw+'px';
  bg.style.height = vh+'px';
  bg.width  = Math.round(vw*dpr);
  bg.height = Math.round(vh*dpr);
  bgctx.setTransform(dpr,0,0,dpr,0,0);
  bgctx.imageSmoothingEnabled = false;

  // Geometry of the center copy, matched exactly to the scaled center screen.
  tileW = FW * s;                       // width of one copy in screen px
  const tileH = FH * s;                 // height of one copy in screen px
  centerLeft = (vw - tileW) / 2;        // center copy is horizontally centered
  bgTop = (vh - tileH) / 2;             // vertically centered (matches center)

  // Only show side copies when there's real black space beside the center,
  // i.e. desktop-ish widths. On mobile the center fills the width -> no sides.
  showSides = (centerLeft > 0.5);

  renderBG(lastDrawn);                  // redraw immediately on resize
}
let bgTop = 0;
window.addEventListener('resize', fit);

// A tiny offscreen canvas holding the CURRENT frame at native 224x288.
// We stamp copies of it into the background, scaled by SCALE (nearest-neighbour,
// so it's the exact same pixels as the center -- no stretching, no smoothing).
const src = document.createElement('canvas');
src.width = FW; src.height = FH;
const srcctx = src.getContext('2d');

// Draw the background: the same frame tiled left and right of the center, at the
// SAME scale, synced to the SAME frame. Copies are clipped at the screen edges
// so the effect reaches all the way out with no black bars.
let lastDrawn = 0;
function renderBG(frameIndex){
  const vw = window.innerWidth, vh = window.innerHeight;
  bgctx.clearRect(0,0,vw,vh);
  if(!showSides || tileW<=0) return;   // mobile / no side room -> nothing here

  bgctx.imageSmoothingEnabled = false;
  const tileH = FH * SCALE;
  // How many copies are needed to cover from center outwards to each edge.
  const leftCount  = Math.ceil(centerLeft / tileW);
  const rightSpace = vw - (centerLeft + tileW);
  const rightCount = Math.ceil(rightSpace / tileW);

  // Left side (copies going left from the center)
  for(let n=1; n<=leftCount; n++){
    bgctx.drawImage(src, centerLeft - n*tileW, bgTop, tileW, tileH);
  }
  // Right side (copies going right from the center)
  for(let n=1; n<=rightCount; n++){
    bgctx.drawImage(src, centerLeft + n*tileW, bgTop, tileW, tileH);
  }
  // (The center itself is the separate #screen canvas on top; not drawn here.)
}

// ---- Playback at the measured cadence, perfect wrap 31 -> 0 ----------------
let cur=-1, last=performance.now(), acc=FRAME_MS;
function draw(i){
  ctx.putImageData(frameImages[i], 0, 0);       // center canvas (unchanged)
  srcctx.putImageData(frameImages[i], 0, 0);    // keep offscreen source in sync
  lastDrawn = i;
  renderBG(i);                                   // stamp the sides, same frame
}
function tick(now){
  acc += now-last; last=now;
  while(acc >= FRAME_MS){
    acc -= FRAME_MS;
    cur=(cur+1)%frameImages.length;
    draw(cur);
  }
  requestAnimationFrame(tick);
}
fit();                 // establish geometry first
requestAnimationFrame(tick);
