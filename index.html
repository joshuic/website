<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Starfield</title>
<style>
  :root{
    --game-w: 224;      /* native raster width,  in game pixels */
    --game-h: 256;      /* native raster height, in game pixels */
    --bg: #000;         /* pure black */
    --gutter-bg: #000;  /* the side borders - restyle these later */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; }

  /* [ left gutter ][ screen ][ right gutter ] */
  .cabinet{
    position:fixed; inset:0;
    display:flex;
    align-items:stretch;
    justify-content:center;
    background:var(--bg);
  }

  .gutter{
    flex:1 1 0;          /* the two gutters share the leftover width */
    min-width:0;
    position:relative;
    background:var(--gutter-bg);
  }

  .screen{
    position:relative;
    flex:0 0 auto;
    /* --u = size of ONE game pixel, from the viewport height. The screen
       runs top-to-bottom; the leftover width becomes the side borders. */
    --u: calc(100dvh / var(--game-h));
    height: 100dvh;
    width:  calc(var(--game-w) * var(--u));
    background:var(--bg);
    overflow:hidden;
  }

  @media (max-aspect-ratio: 224/256){
    .cabinet{ align-items:center; }
    .screen{
      --u: calc(100vw / var(--game-w));
      width: 100vw;
      height: calc(var(--game-h) * var(--u));
    }
  }

  /* One element per star: exactly one game pixel, a square with 4 sides.
     A star NEVER changes column, so `left` is written once and never again.
     Only the row (transform) and lit state (opacity) change. */
  .screen i{
    position:absolute;
    top:0; left:0;
    width:  var(--u);
    height: var(--u);
    display:block;
    will-change: transform, opacity;
  }

  /* Sits above the stars, inside the screen, so it scales with the pixels. */
  .overlay{ position:absolute; inset:0; z-index:2; pointer-events:none; }
  .overlay > *{ pointer-events:auto; }
</style>
</head>
<body>

<div class="cabinet">
  <aside class="gutter" id="gutter-left"></aside>

  <main class="screen" id="screen" role="img" aria-label="Scrolling starfield">
    <div class="overlay" id="overlay">
      <!-- Add anything here, e.g.
           <h1 style="color:#fff;font:2vh monospace;padding:1vh">HELLO</h1> -->
    </div>
  </main>

  <aside class="gutter" id="gutter-right"></aside>
</div>

<script>

  'use strict';

  /* --------------------------------------------------------------------
     THE MODEL
       Every star has a FIXED column and a FIXED colour. It never moves
       left or right. It only scrolls downward, and blinks on and off.

     GEOMETRY - from the 224x256 native screenshots (lossless, so exact):
       243 stars. 63 colours: the hardware uses a 2-bit-per-channel DAC,
       so every channel is one of exactly four levels - 0, 194, 214, 255.
       4 x 4 x 4 = 64, and all 63 non-black combinations are in use.
       Scroll is 0.5 px/frame: a star drops one row every 2 frames, and
       the field wraps every 512 frames.

     TIMING - from the video (a real 60fps recording):
       Each star is lit for ~15 frames, then dark for ~17: a ~32-frame
       twinkle at ~45% duty. That puts ~110 stars on screen at once,
       which is what the video actually shows.

     WHY THE SCREENSHOTS ALONE WERE NOT ENOUGH:
       The emulator writes each star on only one of every two fields, so
       the raw screenshots catch about half the stars per frame (~55). The
       odd- and even-numbered ones also turned out to be 129 rows apart -
       they are not one continuous take. Their ORDER is therefore not a
       usable timeline, even though their PIXELS are perfect. So position
       and colour come from the screenshots, and blink timing comes from
       the video. That is why both were needed.
     -------------------------------------------------------------------- */

  const GH = DATA.h;        // 256
  const NF = DATA.frames;   // 512 - scroll and twinkle share this one loop

  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function inflate(u8){
    const s = new Blob([u8]).stream().pipeThrough(new DecompressionStream('deflate'));
    return new Uint8Array(await new Response(s).arrayBuffer());
  }

  const screen  = document.getElementById('screen');
  const overlay = document.getElementById('overlay');

  (async () => {
    const pos   = await inflate(b64(DATA.pos));    // x[] , y[] , colour[]
    const blink = await inflate(b64(DATA.blink));  // 1 bit per star per frame
    const n     = DATA.n;
    const BPS   = Math.ceil(NF / 8);

    const nodes = [];
    const frag  = document.createDocumentFragment();

    for (let i = 0; i < n; i++){
      const el = document.createElement('i');
      el.style.background = DATA.pal[ pos[2*n + i] ];
      el.style.left       = 'calc(' + pos[i] + ' * var(--u))';  // set once
      frag.appendChild(el);
      nodes.push({ el, y0: pos[n + i], off: i * BPS, ty: -1, lit: -1 });
    }
    screen.insertBefore(frag, overlay);

    let frame = 0;

    function tick(){
      // 0.5 px/frame, wrapping at 256 rows -> the whole field loops in 512.
      // Always a whole number of rows, so a star is never drawn on a half
      // pixel and stays a crisp square.
      const sh   = (frame >> 1) % GH;
      const byte = frame >> 3, bit = 1 << (frame & 7);

      for (let i = 0; i < n; i++){
        const nd = nodes[i];

        const ty = (nd.y0 + sh) % GH;
        if (ty !== nd.ty){
          nd.ty = ty;
          nd.el.style.transform = 'translateY(calc(' + ty + ' * var(--u)))';
        }

        const lit = (blink[nd.off + byte] & bit) ? 1 : 0;
        if (lit !== nd.lit){
          nd.lit = lit;
          nd.el.style.opacity = lit ? '1' : '0';
        }
      }

      frame = (frame + 1) % NF;   // scroll and twinkle wrap together
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    window.Starfield = { nodes, overlay, screen, get frame(){ return frame; } };
  })();
})();
